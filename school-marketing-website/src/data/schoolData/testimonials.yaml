# =============================================================================
# TESTIMONIALS  (shown on the landing page)
# =============================================================================

# LAYOUT VARIANT — choose ONE:
#
#   cards    - Three-column grid of quote cards. Shows all testimonials.
#              Best when you have 3–6 quotes.
#
#   featured - One large highlighted quote shown prominently at the top,
#              with the remaining quotes listed in a smaller row below.
#              Best when you want one standout story.
#
variant: cards

# ---------------------------------------------------------------------------
# ALUMNI TESTIMONIALS
# ---------------------------------------------------------------------------
# HOW TO ADD A PHOTO:
#   1. Save the alumni photo inside the "public/images/testimonials/" folder.
#      Ideal size: 200×200 px, square crop. Format: WebP.
#      Example: public/images/testimonials/juan-dela-cruz.webp
#   2. Set the image value to just the filename with subfolder:
#        image: "testimonials/juan-dela-cruz.webp"
#   3. Leave as "" to show a placeholder icon.
